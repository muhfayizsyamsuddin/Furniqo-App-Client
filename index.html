<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Furniqo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="d-flex">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="logo text-center ms-3">
        <a href="index.html">
          <img
            src="furniqo-high-resolution-logo-transparent.png"
            alt="Furniqo Logo"
          />
        </a>
      </div>

      <!-- Search -->
      <input
        type="text"
        class="form-control search-input"
        placeholder="Cari produk..."
        oninput="alert('Fitur pencarian belum tersedia')"
      />

      <!-- Navigation -->
      <a href="index.html" class="active"><i class="bi bi-house"></i> Home</a>
      <a href="login.html"><i class="bi bi-box-arrow-in-right"></i> Login</a>
      <a href="register.html"><i class="bi bi-pencil-square"></i> Register</a>
      <a href="list-product.html"
        ><i class="bi bi-pencil-square"></i> Product List</a
      >
      <a href="list-category.html"
        ><i class="bi bi-pencil-square"></i> Category List</a
      >
      <a href="add-user.html"><i class="bi bi-pencil-square"></i> Add User</a>
      <div class="mt-auto text-center">
        <a href="register.html" class="text-danger">
          <i class="bi bi-box-arrow-right"></i> Logout
        </a>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content flex-grow-1 p-4">
      <h2 class="mb-4">Produk Unggulan</h2>

      <!-- Kategori -->
      <div class="dropdown mb-4">
        <button
          class="btn btn-secondary dropdown-toggle"
          type="button"
          data-bs-toggle="dropdown"
        >
          Pilih Kategori
        </button>
        <ul class="dropdown-menu dropdown-menu-dark">
          <li><a class="dropdown-item active" href="#">All Products</a></li>
          <li><a class="dropdown-item" href="#">Office</a></li>
          <li><a class="dropdown-item" href="#">Living Room</a></li>
          <li><hr class="dropdown-divider" /></li>
          <li><a class="dropdown-item" href="#">Promo</a></li>
        </ul>
      </div>

      <div class="container my-4">
        <div class="row mb-3">
          <div class="col-md-6">
            <select class="form-select">
              <option selected>Pilih berdasarkan</option>
              <option value="price-asc">Produk Terbaru</option>
              <option value="price-desc">Produk Terlama</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-3 mb-3">
            <a href="detail.html" class="text-decoration-none text-dark">
              <div class="card h-100">
                <img
                  src="https://d2xjmi1k71iy2m.cloudfront.net/dairyfarm/id/images/220/1022010_PE832396_S5.webp"
                  class="img-fluid product-image shadow-sm"
                  alt="Produk"
                  style="object-fit: cover"
                />
                <div class="card-body">
                  <h5 class="card-title">Office Desk</h5>
                  <p class="text-muted mb-1">Rp 2.500.000</p>
                  <span class="badge bg-secondary">Meja</span>
                </div>
              </div>
            </a>
          </div>

          <div class="col-md-3 mb-3">
            <a href="detail.html" class="text-decoration-none text-dark">
              <div class="card h-100">
                <img
                  src="https://d2xjmi1k71iy2m.cloudfront.net/dairyfarm/id/images/017/0601743_PE681617_S5.webp"
                  class="img-fluid product-image shadow-sm"
                  alt="Produk"
                  style="object-fit: cover"
                />
                <div class="card-body">
                  <h5 class="card-title">Wardrobe Cabinet</h5>
                  <p class="text-muted mb-1">Rp 3.500.000</p>
                  <span class="badge bg-secondary">Lemari</span>
                </div>
              </div>
            </a>
          </div>
        </div>

        <!-- Pagination -->
        <nav class="mt-4">
          <ul class="pagination justify-content-end">
            <li class="page-item disabled">
              <a class="page-link">Previous</a>
            </li>
            <li class="page-item active">
              <a class="page-link" href="#">1</a>
            </li>
            <li class="page-item"><a class="page-link" href="#">2</a></li>
            <li class="page-item"><a class="page-link" href="#">Next</a></li>
          </ul>
        </nav>
      </div>
      <footer class="text-center mt-5 text-muted">
        <p>&copy; 2025 Furniqo. All rights reserved.</p>
      </footer>
    </div>
  </body>
</html>
