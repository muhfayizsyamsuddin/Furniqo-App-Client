    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo text-center ms-3">
        <a href="index.html">
          <img
            src="furniqo-high-resolution-logo-transparent.png"
            alt="Furniqo Logo"
          />
        </a>
      </div>

      <input
        type="text"
        class="form-control search-input"
        placeholder="Cari produk..."
        oninput="alert('Fitur pencarian belum tersedia')"
      />

      <a href="index.html"><i class="bi bi-house"></i> Home</a>
      <a href="list-product.html"
        ><i class="bi bi-box-arrow-in-right"></i> Product List</a
      >
      <a href="list-category.html"
        ><i class="bi bi-box-arrow-in-right"></i> Category List</a
      >
      <a href="add-user.html"><i class="bi bi-pencil-square"></i> Add User</a>
      <div class="mt-auto">
        <a href="register.html" class="text-danger">
          <i class="bi bi-box-arrow-right"></i> Logout
        </a>
      </div>
    </div>

    <!-- table -->
    <div class="main-content flex-grow-1 p-4">
      <h2 class="mb-4">Add New User</h2>
      <form class="row g-3" id="form-add-user">
        <div class="col-md-6">
          <label for="inputEmail4" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="inputEmail4"
            name="email"
            autocomplete="email"
            placeholder="email@example.com"
            required
          />
        </div>
        <div class="col-md-6">
          <label for="inputPassword4" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="inputPassword4"
            name="password"
            autocomplete="new-password"
            placeholder="********"
            required
          />
        </div>
        <div class="col-12">
          <label for="inputAddress" class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            id="inputUsername"
            name="username"
            autocomplete="username"
            placeholder="example"
            required
          />
        </div>
        <div class="col-12">
          <label for="inputAddress2" class="form-label">Address</label>
          <input
            type="text"
            class="form-control"
            id="inputAddress"
            name="address"
            autocomplete="address"
            placeholder="Apartment, studio, or floor"
          />
        </div>
        <div class="col-md-6">
          <label for="inputPhone" class="form-label">Phone Number</label>
          <input
            type="tel"
            class="form-control"
            id="inputPhone"
            name="phoneNumber"
            autocomplete="tel"
            placeholder="+62 -"
            required
          />
        </div>
        <!-- <div class="col-md-4">
        <label for="inputState" class="form-label">State</label>
        <select id="inputState" class="form-select">
          <option selected>Choose...</option>
          <option>...</option>
        </select>
      </div> -->
        <!-- <div class="col-md-2">
        <label for="inputZip" class="form-label">Zip</label>
        <input type="text" class="form-control" id="inputZip" />
      </div> -->
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="gridCheck" />
            <label class="form-check-label" for="gridCheck">
              Check me out
            </label>
          </div>
        </div>
        <div class="col-12">
          <button type="submit" class="badge bg-warning text-dark ms-1">
            Add User
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
