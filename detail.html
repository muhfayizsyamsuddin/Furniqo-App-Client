<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Produk | Furniqo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        <a href="index.html">
          <img
            src="furniqo-high-resolution-logo-transparent.png"
            alt="Furniqo Logo"
          />
        </a>
      </div>

      <input
        type="text"
        class="form-control search-input"
        placeholder="Cari produk..."
        oninput="alert('Fitur pencarian belum tersedia')"
      />

      <a href="index.html"><i class="bi bi-house"></i> Home</a>
      <a href="login.html"><i class="bi bi-box-arrow-in-right"></i> Login</a>
      <a href="register.html"><i class="bi bi-pencil-square"></i> Register</a>
    </div>

    <!-- Detail Content -->
    <div class="main-content flex-grow-1 p-4">
      <div class="row g-4">
        <h4>Produk Terkait</h4>
        <!-- Gambar Produk -->
        <div class="col-md-6">
          <img
            src="https://d2xjmi1k71iy2m.cloudfront.net/dairyfarm/id/images/220/1022010_PE832396_S5.webp"
            alt="Office Desk"
            class="img-fluid product-image shadow-sm"
          />
        </div>

        <!-- Detail Produk -->
        <div class="col-md-6">
          <h2 class="fw-bold">Office Desk</h2>
          <p class="text-muted">Kategori: Office Furniture</p>
          <p class="fs-4 text-success fw-semibold">Rp 2.500.000</p>

          <p class="mt-3">
            Meja kantor minimalis dengan desain ergonomis. Terbuat dari kayu
            solid, dilengkapi dengan laci penyimpanan, ideal untuk ruang kerja
            maupun belajar.
          </p>

          <ul class="list-group my-3">
            <li class="list-group-item"><strong>Stok:</strong> Tersedia</li>
          </ul>

          <!-- <button class="btn btn-warning btn-lg mt-3">
            <i class="bi bi-cart-plus"></i> Tambah ke Keranjang
          </button> -->
        </div>
      </div>
    </div>
    <footer class="text-center mt-5 text-muted">
      <p>&copy; 2025 Furniqo. All rights reserved.</p>
    </footer>
  </body>
</html>
