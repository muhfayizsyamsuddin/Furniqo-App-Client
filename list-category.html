<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Product</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo text-center ms-3">
        <a href="index.html">
          <img
            src="furniqo-high-resolution-logo-transparent.png"
            alt="Furniqo Logo"
          />
        </a>
      </div>

      <input
        type="text"
        class="form-control search-input"
        placeholder="Cari produk..."
        oninput="alert('Fitur pencarian belum tersedia')"
      />

      <a href="index.html"><i class="bi bi-house"></i> Home</a>
      <a href="list-product.html"
        ><i class="bi bi-box-arrow-in-right"></i> Product</a
      >
      <a href="list-category.html"
        ><i class="bi bi-box-arrow-in-right"></i> Category</a
      >
      <a href="add-user.html"><i class="bi bi-pencil-square"></i> Add User</a>
      <div class="mt-auto">
        <a href="register.html" class="text-danger">
          <i class="bi bi-box-arrow-right"></i> Logout
        </a>
      </div>
    </div>

    <div class="row">
      <div class="col-6 table-responsive">
        <div class="main-content flex-grow-1 p-4">
          <h1>List Category</h1>
          <table class="table caption-top align-middle">
            <caption>
              List of category
            </caption>
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Name</th>
              </tr>
            </thead>
            <tbody id="table-product">
              <tr>
                <th scope="row">1</th>
                <td>Office Desk</td>
              </tr>
              <tr>
                <th scope="row">2</th>
                <td>Office Chair</td>
              </tr>
              <tr>
                <th scope="row">3</th>
                <td>Bookshelf Rack</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
