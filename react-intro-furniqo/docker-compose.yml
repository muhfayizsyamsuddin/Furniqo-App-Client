services:

  client:
    # build: .
    image: faizms14/furniqo-app-client:v1.0
    # env_file: .env
    container_name: furniqo-app-client
    # ports:
    #   - 80:80
    networks:
      - proxy_net
      - furniqo-app-net
    labels:
      traefik.enable: true
      traefik.docker.network: proxy_net
      traefik.http.routers.furniqo.rule: Host(`furniqo.faizms.com`)
      traefik.http.routers.furniqo.entrypoints: websecure
      traefik.http.routers.furniqo.tls.certresolver: myresolver
      traefik.http.services.furniqo.loadbalancer.server.port: 80

networks:
  furniqo-app-net:
    driver: bridge
  proxy_net:
    external: true